<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Q3 Skills Test</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container my-4">
    <br>
<div style="background-color:#e6f2ff; padding:15px; border-radius:6px; text-align:center;">
  <h1>📋 Member Sign-Up</h1>
</div>

<br>
    <h5>Student Details</h5>
    <label for="fullname" class="form-label">Full Name</label>
    <input type="text" id="fullname" class="form-control mb-3" placeholder="Enter your name">

    <h5>Ticket Selection</h5>
  <label for="quantity" class="form-label">Quantity (₱250.00 each)</label>
<input type="number" id="quantity" class="form-control mb-3" value="0" min="0">


    <label for="memberid" class="form-label">Member ID</label>
    <input type="text" id="memberid" class="form-control mb-3" placeholder="Enter ID">

   <button class="btn btn-primary btn-lg w-100" onclick="calculateTotal()">REGISTER</button>


    <div id="output" class="mt-3"></div>
  </div>
  <script src="main.js"></script>
</body>
</html>
